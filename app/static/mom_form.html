<!DOCTYPE html>
<html>
<head>
    <title>Add a Recipe</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }
        h1 {
            font-size: 24px;
        }
        h2 {
            font-size: 20px;
            margin-top: 30px;
        }
        h3 {
            font-size: 16px;
            margin-top: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select, textarea {
            display: block;
            margin-top: 4px;
            margin-bottom: 5px;
            width: 100%;
            padding: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        hr {
            margin: 20px 0;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>Add a Recipe</h1>

<form id="recipeForm">

    <h2>Recipe Details</h2>

    <label for="recipeName">Recipe Name</label>
    <input type="text" id="recipeName" name="recipeName">

    <label for="servings">Servings</label>
    <input type="number" id="servings" name="servings">

    <label for="cuisine">Cuisine (Optional)</label>
    <input type="text" id="cuisine" name="cuisine">

    <label for="description">Description (Optional)</label>
    <input type="text" id="description" name="description">

    <hr>

    <h2>Ingredients</h2>

    <h3>Ingredient 1</h3>

    <label for="ingredientName1">Name</label>
    <input type="text" id="ingredientName1" name="ingredientName1">

    <label for="quantityText1">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText1" name="quantityText1">

    <label for="quantityValue1">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue1" name="quantityValue1">

    <label for="quantityUnit1">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit1" name="quantityUnit1">

    <label for="quantityType1">Type</label>
    <select id="quantityType1" name="quantityType1">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h3>Ingredient 2</h3>

    <label for="ingredientName2">Name</label>
    <input type="text" id="ingredientName2" name="ingredientName2">

    <label for="quantityText2">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText2" name="quantityText2">

    <label for="quantityValue2">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue2" name="quantityValue2">

    <label for="quantityUnit2">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit2" name="quantityUnit2">

    <label for="quantityType2">Type</label>
    <select id="quantityType2" name="quantityType2">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h3>Ingredient 3</h3>

    <label for="ingredientName3">Name</label>
    <input type="text" id="ingredientName3" name="ingredientName3">

    <label for="quantityText3">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText3" name="quantityText3">

    <label for="quantityValue3">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue3" name="quantityValue3">

    <label for="quantityUnit3">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit3" name="quantityUnit3">

    <label for="quantityType3">Type</label>
    <select id="quantityType3" name="quantityType3">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h3>Ingredient 4</h3>

    <label for="ingredientName4">Name</label>
    <input type="text" id="ingredientName4" name="ingredientName4">

    <label for="quantityText4">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText4" name="quantityText4">

    <label for="quantityValue4">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue4" name="quantityValue4">

    <label for="quantityUnit4">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit4" name="quantityUnit4">

    <label for="quantityType4">Type</label>
    <select id="quantityType4" name="quantityType4">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h3>Ingredient 5</h3>

    <label for="ingredientName5">Name</label>
    <input type="text" id="ingredientName5" name="ingredientName5">

    <label for="quantityText5">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText5" name="quantityText5">

    <label for="quantityValue5">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue5" name="quantityValue5">

    <label for="quantityUnit5">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit5" name="quantityUnit5">

    <label for="quantityType5">Type</label>
    <select id="quantityType5" name="quantityType5">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h3>Ingredient 6</h3>

    <label for="ingredientName6">Name</label>
    <input type="text" id="ingredientName6" name="ingredientName6">

    <label for="quantityText6">Quantity (e.g., 1 tbsp, a pinch of salt)</label>
    <input type="text" id="quantityText6" name="quantityText6">

    <label for="quantityValue6">Value (if applicable — e.g., 1)</label>
    <input type="number" id="quantityValue6" name="quantityValue6">

    <label for="quantityUnit6">Unit (if applicable — e.g., tbsp)</label>
    <input type="text" id="quantityUnit6" name="quantityUnit6">

    <label for="quantityType6">Type</label>
    <select id="quantityType6" name="quantityType6">
        <option value="precise" selected>Precise</option>
        <option value="imprecise">Imprecise</option>
        <option value="unmeasured">Unmeasured</option>
    </select>

    <hr>

    <h2>Steps</h2>

    <h3>Step 1</h3>
    <textarea id="step1" name="step1" rows="3"></textarea>

    <hr>

    <h3>Step 2</h3>
    <textarea id="step2" name="step2" rows="3"></textarea>

    <hr>

    <h3>Step 3</h3>
    <textarea id="step3" name="step3" rows="3"></textarea>

    <hr>

    <h3>Step 4</h3>
    <textarea id="step4" name="step4" rows="3"></textarea>

    <hr>

    <h3>Step 5</h3>
    <textarea id="step5" name="step5" rows="3"></textarea>

    <hr>

    <button type="submit">Submit Recipe</button>

</form>

<script>
    document.getElementById("recipeForm").addEventListener("submit", function(event) {
        event.preventDefault();
        const recipeName = document.getElementById("recipeName").value;
        const servings = parseInt(document.getElementById("servings").value);
        const cuisine = document.getElementById("cuisine").value;
        const description = document.getElementById("description").value;
        
        function readIngredient(num) {
            const rawValue = document.getElementById("quantityValue"+ num).value;
            const quantityValue = rawValue === "" ? null : parseInt(rawValue);

            return {
                name: document.getElementById("ingredientName" + num).value,
                quantity_text: document.getElementById("quantityText" + num).value,
                quantity_value: quantityValue,
                unit: document.getElementById("quantityUnit" + num).value,
                quantity_type: document.getElementById("quantityType" + num).value
            }
        }

        const ingredients = [
            readIngredient(1),
            readIngredient(2),
            readIngredient(3),
            readIngredient(4),
            readIngredient(5),
            readIngredient(6),
        ];

        function readStep(num) {
            return {
                position: num,
                content: document.getElementById("step" + num).value
            }
        }

        const steps = [
            readStep(1),
            readStep(2),
            readStep(3),
            readStep(4),
            readStep(5),
        ]

        const filteredIngredients = ingredients.filter(function(ingredient) {
            return ingredient.name !== "";
        });

        const filteredSteps = steps.filter(function(step) {
            return step.content !== "";
        });

        const recipeData = {
            name: recipeName,
            description: description,
            servings: servings,
            cuisine: cuisine,
            ingredients: filteredIngredients,
            steps: filteredSteps
        };
    });
</script>

</body>
</html>
